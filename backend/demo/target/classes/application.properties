spring.application.name=MMT-CLONE
server.port=8080

# POSTGRESQL CONFIG
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:mmt}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:YOUR_DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# MONGODB CONFIG
spring.data.mongodb.uri=${MONGO_URI:mongodb://localhost:27017/mmt_mongo}

# DOCKER CONFIG
spring.docker.compose.enabled=false

# GCP STORAGE CONFIG
gcp.bucket.name=mmt-clone-images
gcp.credentials.file=classpath:gcp-credentials.json

# JWT CONFIGURATION
jwt.secret=${JWT_SECRET:YOUR_JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:3600000}
jwt.refreshExpiration=${JWT_REFRESH_EXPIRATION:604800000}

# LOGGING
logging.level.root=INFO
logging.level.com.example.demo=INFO

# GOOGLE OAUTH2 CONFIGURATION
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:YOUR_GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:YOUR_GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.redirect-uri=${OAUTH_REDIRECT_URI:http://localhost:8080/auth/google/callback}
spring.security.oauth2.client.registration.google.scope=openid,email,profile

# REDIS CONFIGURATION
spring.data.redis.url=${REDIS_URL:redis://localhost:6379}
spring.data.redis.timeout=5000ms

# EMAIL CONFIGURATION
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:YOUR_EMAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD:YOUR_EMAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# CLOUDINARY CONFIGURATION
cloudinary.cloud_name=${CLOUDINARY_NAME:YOUR_CLOUDINARY_CLOUD_NAME}
cloudinary.api_key=${CLOUDINARY_KEY:YOUR_CLOUDINARY_API_KEY}
cloudinary.api_secret=${CLOUDINARY_SECRET:YOUR_CLOUDINARY_API_SECRET}

# RAZORPAY CONFIGURATION
razorpay.key=${RAZORPAY_KEY:YOUR_RAZORPAY_KEY}
razorpay.secret=${RAZORPAY_SECRET:YOUR_RAZORPAY_SECRET}

# HIKARI CONNECTION POOL
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000

# BUSINESS CONFIGURATION
commission.rate=0.25
earth.radius=6371.0
fare.base=50.0
fare.per.km.rate=12.0
fare.per.min.rate=1.5
fare.surge.multiplier=1.0